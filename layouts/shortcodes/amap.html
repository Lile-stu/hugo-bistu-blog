<div class="hugo-amap-instance" 
     data-lng="{{ .Get "lng" }}" 
     data-lat="{{ .Get "lat" }}" 
     data-name="{{ .Get "name" }}"
     style="width: 100%; height: 450px; margin-bottom: 30px; background: #f5f5f5;">
</div>

<script type="text/javascript">
    // 确保全局安全密钥只配置一次
    if (!window._AMapSecurityConfig) {
        window._AMapSecurityConfig = {
            securityJsCode: 'e23299becabb2fecce494c2f927c07ca',
        }
    }

    // 封装初始化单个地图的函数
    function initSingleAmap(el) {
        var lng = parseFloat(el.getAttribute('data-lng'));
        var lat = parseFloat(el.getAttribute('data-lat'));
        var name = el.getAttribute('data-name') || "校区位置";

        var map = new AMap.Map(el, {
            zoom: 15,
            center: [lng, lat]
        });

        var marker = new AMap.Marker({
            position: [lng, lat],
            map: map,
            title: name
        });

        marker.setLabel({
            direction: 'top',
            offset: new AMap.Pixel(0, 0),
            content: "<div style='padding:2px 5px; background:#fff; border:1px solid #ccc; border-radius:3px; font-size:12px; color:#000;'>" + name + "</div>"
        });
    }

    // 检查高德脚本是否已经挂载
    if (window.AMap) {
        // 如果 AMap 已经存在，直接初始化当前最新加入的节点
        var containers = document.querySelectorAll('.hugo-amap-instance');
        if(containers.length > 0) {
            var el = containers[containers.length - 1];
            el.classList.remove('hugo-amap-instance');
            initSingleAmap(el);
        }
    } else if (!document.getElementById('amap-js-sdk')) {
        // 如果脚本还没加载过，则动态创建 script 标签加载，并监听全局加载完成事件
        var script = document.createElement('script');
        script.id = 'amap-js-sdk';
        script.type = 'text/javascript';
        script.src = 'https://webapi.amap.com/maps?v=2.0&key=a29702da69cd94f559b1c6eb544b293e';
        
        script.onload = function() {
            // 脚本加载完成后，一次性初始化页面上现存的所有地图容器
            var containers = document.querySelectorAll('.hugo-amap-instance');
            containers.forEach(function(el) {
                el.classList.remove('hugo-amap-instance');
                initSingleAmap(el);
            });
        };
        document.head.appendChild(script);
    } else {
        // 如果脚本正在加载中，等待加载完成后再初始化
        window.addEventListener('load', function() {
            var containers = document.querySelectorAll('.hugo-amap-instance');
            containers.forEach(function(el) {
                el.classList.remove('hugo-amap-instance');
                initSingleAmap(el);
            });
        });
    }
</script>
