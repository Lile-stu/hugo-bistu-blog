<div id="amap-container-all" style="width: 100%; height: 500px; margin-bottom: 30px; background: #f5f5f5;"></div>

<script type="text/javascript">
    if (!window._AMapSecurityConfig) {
        window._AMapSecurityConfig = {
            securityJsCode: 'e23299becabb2fecce494c2f927c07ca',
        }
    }
</script>

<script type="text/javascript">
    (function() {
        // 如果高德脚本还没加载，延迟等一下再初始化
        function drawAllMap() {
            if (!window.AMap) {
                setTimeout(drawAllMap, 200);
                return;
            }

            var map = new AMap.Map('amap-container-all', {
                zoom: 10,
                center: [116.238416, 40.141085]
            });

            var markersData = [
                { coords: [116.238416, 40.141085], name: "沙河校区" },
                { coords: [116.347047, 40.038011], name: "小营校区" },
                { coords: [116.382489, 39.98881],  name: "健翔桥校区" },
                { coords: [116.489077, 39.96484],  name: "酒仙桥校区" },
                { coords: [116.469759, 39.921243], name: "金台路校区" },
                { coords: [115.643653, 40.376666], name: "张家口校区" }
            ];
            
            markersData.forEach(function(item) {
                var marker = new AMap.Marker({
                    position: item.coords,
                    map: map,
                    title: item.name
                });

                marker.setLabel({
                    direction: 'top',
                    offset: new AMap.Pixel(0, 0),
                    content: "<div style='padding:2px 5px; background:#fff; border:1px solid #ccc; border-radius:3px; font-size:12px; color:#000;'>" + item.name + "</div>"
                });
            });

            map.setFitView();
        }

        drawAllMap();
    })();
</script>
